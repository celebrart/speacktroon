<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Transcrição Interna Salesforce</title>
    <style>
        :root { --sf-blue: #0176d3; --bg: #f3f3f3; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; background: #2f3136; }
        
        #floating-card {
            width: 380px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--sf-blue);
            color: white;
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #output {
            height: 350px;
            padding: 15px;
            overflow-y: auto;
            background: var(--bg);
            font-size: 14px;
            line-height: 1.5;
            color: #333;
            border-bottom: 1px solid #ddd;
        }

        .msg-cliente { border-left: 4px solid var(--sf-blue); padding-left: 10px; margin-bottom: 10px; background: #eef4ff; padding: 8px; border-radius: 4px; }

        .footer { padding: 15px; display: flex; gap: 10px; background: #fff; }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-start { background: #22c55e; color: white; }
        .btn-stop { background: #ef4444; color: white; display: none; }
        .btn-export { background: #ecebea; color: #333; }

        .status-rec { display: flex; align-items: center; gap: 5px; font-size: 12px; }
        .dot { width: 8px; height: 8px; background: #ff4b4b; border-radius: 50%; animation: pulse 1s infinite; display: none; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="floating-card">
    <div class="header">
        <span>Transcritor de Chamada</span>
        <div class="status-rec"><div class="dot" id="dot"></div> <span id="status-text">Pronto</span></div>
    </div>
    
    <div id="output">
        <p style="color: #666;">1. Clique em Iniciar.<br>2. Selecione a aba do <b>Salesforce</b>.<br>3. <b>MARQUE</b> a opção "Compartilhar áudio".</p>
    </div>

    <div class="footer">
        <button class="btn-start" id="btnStart">Iniciar Transcrição</button>
        <button class="btn-stop" id="btnStop">Parar</button>
        <button class="btn-export" id="btnExport">Salvar Log</button>
    </div>
</div>

<script>
    let recognition;
    let stream;
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const btnExport = document.getElementById('btnExport');
    const output = document.getElementById('output');
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('status-text');

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'pt-BR';

        recognition.onstart = () => {
            statusText.innerText = "Ouvindo Cliente...";
            dot.style.display = 'block';
            btnStart.style.display = 'none';
            btnStop.style.display = 'block';
        };

        recognition.onresult = (event) => {
            let interim = '';
            let final = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    final += event.results[i][0].transcript;
                } else {
                    interim += event.results[i][0].transcript;
                }
            }

            if (final !== '') {
                const div = document.createElement('div');
                div.className = 'msg-cliente';
                div.innerHTML = `<strong>Cliente:</strong> ${final}`;
                output.appendChild(div);
                output.scrollTop = output.scrollHeight;
            }
        };

        recognition.onend = () => {
            statusText.innerText = "Encerrado";
            dot.style.display = 'none';
            btnStart.style.display = 'block';
            btnStop.style.display = 'none';
        };

        btnStart.onclick = async () => {
            try {
                // Tenta capturar o áudio da aba
                // Nota: O Chrome exige que você selecione a aba e marque "Compartilhar Áudio"
                stream = await navigator.mediaDevices.getDisplayMedia({
                    video: true, 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }
                });
                
                output.innerHTML = ""; // Limpa instruções
                recognition.start();
            } catch (err) {
                alert("Para funcionar, você precisa permitir o compartilhamento de áudio da aba.");
            }
        };

        btnStop.onclick = () => {
            recognition.stop();
            if(stream) stream.getTracks().forEach(track => track.stop());
        };

        btnExport.onclick = () => {
            const blob = new Blob([output.innerText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `atendimento_${new Date().toLocaleTimeString()}.txt`;
            a.click();
        };

    } else {
        output.innerText = "Navegador não suportado. Use o Chrome.";
    }
</script>

</body>
</html>
