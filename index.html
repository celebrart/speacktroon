<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Transcrição de Voz</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #popup {
      width: 350px;
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    button {
      margin: 5px;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      height: 150px;
      margin-top: 10px;
      border-radius: 8px;
      padding: 10px;
    }
  </style>
</head>
<body>

<div id="popup">
  <h3>🎤 Transcrição</h3>

  <button onclick="start()">▶️ Começar</button>
  <button onclick="pause()">⏸️ Pausar</button>
  <button onclick="stop()">⏹️ Encerrar</button>
  <button onclick="copyText()">📋 Copiar</button>

  <textarea id="transcription" placeholder="A fala vai aparecer aqui..."></textarea>
</div>

<script>
  let recognition;
  let isRunning = false;

  if ('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
  } else {
    alert("Seu navegador não suporta reconhecimento de voz");
  }

  recognition.lang = 'pt-BR';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = function(event) {
    let texto = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      texto += event.results[i][0].transcript;
    }

    document.getElementById("transcription").value += texto;
  };

  function start() {
    if (!isRunning) {
      recognition.start();
      isRunning = true;
    }
  }

  function pause() {
    recognition.stop();
    isRunning = false;
  }

  function stop() {
    recognition.stop();
    isRunning = false;
  }

  function copyText() {
    const textarea = document.getElementById("transcription");
    textarea.select();
    document.execCommand("copy");
    alert("Texto copiado!");
  }
</script>

</body>
</html>
